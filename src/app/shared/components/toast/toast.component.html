@if(toast) {
<div class="toast show position-fixed top-0 end-0 m-3 text-white" [ngClass]="{
    'bg-success': toast.type === 'success',
    'bg-danger': toast.type === 'error',
    'bg-info': toast.type === 'info',
    'bg-warning': toast.type === 'warning'
  }">
    <div class="toast-body">
        {{ toast.message }}
    </div>
</div>
}
